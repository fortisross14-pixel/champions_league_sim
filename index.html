<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Champions League Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/src/style.css">
<!-- Twemoji renders flag/regional-indicator emoji as images so they
     show up consistently on Windows (where the system fonts have no
     flag glyphs at all) and other platforms with limited emoji
     support. main.js calls `window.twemoji.parse(document.body)` after
     each render. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/twemoji.min.js" crossorigin="anonymous"></script>
</head>
<body>

<div id="app">
  <header class="header">
    <div class="header-left">
      <div class="ucl-star">★</div>
      <div>
        <div class="header-title">CHAMPIONS LEAGUE</div>
        <div class="header-sub">SIMULATOR</div>
      </div>
    </div>
    <div class="header-center">
      <div class="season-badge">Season <span id="cur-season">1</span></div>
      <div id="phase-label" class="phase-label">Ready</div>
    </div>
    <div class="header-right">
      <span id="last-saved" class="saved-stamp"></span>
      <button class="btn btn-primary" id="btn-main" onclick="handleMain()">▶ New Season</button>
      <button class="btn btn-icon" onclick="openSettings()">⚙</button>
    </div>
  </header>

  <nav class="nav">
    <button class="nav-tab active" data-tab="play" onclick="switchTab('play')">⚽ Play</button>
    <button class="nav-tab" data-tab="groups" onclick="switchTab('groups')">👥 Groups</button>
    <button class="nav-tab" data-tab="bracket" onclick="switchTab('bracket')">🏆 Bracket</button>
    <button class="nav-tab" data-tab="season" onclick="switchTab('season')">📅 Season</button>
    <button class="nav-tab" data-tab="stars" onclick="switchTab('stars')">⭐ Stars & Coaches</button>
    <button class="nav-tab" data-tab="teams" onclick="switchTab('teams')">📊 Teams</button>
    <button class="nav-tab" data-tab="history" onclick="switchTab('history')">📜 History</button>
  </nav>

  <main class="panels">
    <div id="tab-play" class="panel active"></div>
    <div id="tab-groups" class="panel"></div>
    <div id="tab-bracket" class="panel"></div>
    <div id="tab-season" class="panel"></div>
    <div id="tab-stars" class="panel"></div>
    <div id="tab-teams" class="panel"></div>
    <div id="tab-history" class="panel"></div>
  </main>
</div>

<!-- SETTINGS OVERLAY -->
<div id="settings-overlay" class="overlay" style="display:none" onclick="if(event.target===this)closeSettings()">
  <div class="settings-panel">
    <div class="settings-header">
      <span>Settings</span>
      <button class="btn btn-icon" onclick="closeSettings()">✕</button>
    </div>
    <button class="settings-item" onclick="openSaveManager()">🗂️ Save Manager</button>
    <button class="settings-item" onclick="doExport()">📤 Export Save</button>
    <label class="settings-item">📥 Import Save
      <input type="file" accept=".json" style="display:none" onchange="doImport(event)">
    </label>
    <div class="settings-divider"></div>
    <button class="settings-item danger" onclick="confirmReset()">🗑️ Reset World</button>
  </div>
</div>

<!-- SAVE MANAGER OVERLAY -->
<div id="saves-overlay" class="overlay" style="display:none" onclick="if(event.target===this)closeSaveManager()">
  <div class="saves-panel">
    <div class="settings-header">
      <span>Save Manager</span>
      <button class="btn btn-icon" onclick="closeSaveManager()">✕</button>
    </div>

    <div class="saves-help">
      Saves live in this browser. They survive refreshes but can be wiped if you clear site data.
      <strong>Export to a file</strong> for anything you'd be sad to lose.
    </div>

    <div class="save-new">
      <input id="save-name" class="input" placeholder="Name this save (e.g. 'Season 8 — finals')…">
      <button class="btn btn-primary btn-sm" onclick="doSaveSlot()">Save Slot</button>
    </div>

    <div class="saves-actions">
      <button class="btn btn-sm" onclick="doExport()">📤 Export to file</button>
      <label class="btn btn-sm" style="cursor:pointer;display:inline-flex;align-items:center;gap:6px">
        📥 Import from file
        <input type="file" accept=".json" style="display:none" onchange="doImport(event)">
      </label>
    </div>

    <div id="saves-list"></div>
  </div>
</div>

<!-- CONFIRM OVERLAY -->
<div id="confirm-overlay" class="overlay" style="display:none">
  <div class="confirm-panel">
    <div class="confirm-icon" id="confirm-icon">⚠️</div>
    <div class="confirm-title" id="confirm-title">Are you sure?</div>
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-buttons">
      <button class="btn btn-secondary" onclick="confirmDeny()">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok" onclick="confirmAccept()">Confirm</button>
    </div>
  </div>
</div>

<!-- MATCH RESULT POPUP -->
<div id="match-popup" class="match-popup" style="display:none">
  <div class="match-popup-inner" id="match-popup-inner"></div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
